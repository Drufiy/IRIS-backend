# ══════════════════════════════════════════════════════════════════════════════
# IRIS Configuration
# ══════════════════════════════════════════════════════════════════════════════

# ── Operation Mode ──────────────────────────────────────────────────────────
#   "remote"  — All traffic (LLM, TTS, ASR) routes through the shared backend
#               proxy. You only need the proxy URL + optional auth token.
#               No individual API keys required.
#
#   "local"   — Each service uses your own API keys and endpoints.
#               Fully configurable — set base_url, api_key_env, and model
#               independently for LLM, TTS, and ASR.
mode: "local"

# ── Remote mode (only used when mode: "remote") ─────────────────────────────
# Single proxy URL routes all three services. The proxy holds the shared keys.
remote:
  backend_url: "http://localhost:8000"
  auth_token_env: "IRIS_AUTH_TOKEN"          # optional — env var name for token

# ── Local mode: LLM ─────────────────────────────────────────────────────────
# Used when mode: "local". Also, task_routing and default_model apply in both
# modes (they determine which model name to request).
llm:
  base_url: "https://api.deepseek.com"
  api_key_env: "DEEPSEEK_API_KEY"            # env var to read the API key from
  default_model: "deepseek-v4-pro"
  task_routing:
    plan:   "deepseek-v4-pro"
    chat:   "deepseek-v4-pro"
    code:   "deepseek-v4-pro"
    reason: "deepseek-v4-pro"
    local:  "deepseek-v4-pro"
    memory: "deepseek-v4-pro"

# ── Local mode: Voice / TTS ─────────────────────────────────────────────────
# Used when mode: "local". Also used in remote mode for voice selection.
voice:
  api_key_env: "ELEVENLABS_API_KEY"
  voice_name: "Bella"
  voice_id: "hpp4J3VqNfWAUOO0d1Us"
  model: "eleven_flash_v2_5"
  stream: true

# ── Local mode: ASR (speech-to-text) ────────────────────────────────────────
# Used when mode: "local".
asr:
  api_key_env: "GROQ_API_KEY"
  model: "whisper-large-v3-turbo"

# ── Shared configs (applied in both modes) ──────────────────────────────────

memory:
  chroma_path: "~/.iris/memory/chroma"
  embedding_model: "BAAI/bge-m3"
  short_term_limit: 20
  top_k_retrieval: 5
  habit_retrieval_limit: 3

audio:
  sample_rate: 16000
  channels: 1
  dtype: "float32"
  wake_words: ["jarvis", "iris"]

ui:
  ipc_port: 7788
  outline_width: 3

browser:
  headless: false
  credentials_path: "~/.iris/credentials.enc"

email:
  smtp_server: "smtp.gmail.com"
  smtp_port: 587
  sender_email: "your_email@gmail.com"
  sender_password: ""
  imap_server: "imap.gmail.com"
  receiver_email: "your_email@gmail.com"
  receiver_password: ""

weather:
  openweather_api_key: ""
  default_city: "London"

todo:
  default_priority: "normal"

timers:
  default_timezone: "UTC"

logging:
  level: "DEBUG"
  log_file: "logs/iris.log"
