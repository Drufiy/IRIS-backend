llm:
  # ── Provider selection ────────────────────────────────────────────────────
  # Options:
  #   "deepseek"     — Direct calls to api.deepseek.com (user's own DEEPSEEK_API_KEY)
  #   "agentrouter"  — Direct calls to agentrouter.org (user's own AGENT_ROUTER_TOKEN)
  #   "shared"       — Shared backend proxy (no user API key needed)
  #   "custom"       — Any OpenAI-compatible endpoint
  provider: "deepseek"

  # For "shared" mode: URL of the shared backend proxy (e.g., deployed on Railway/Render)
  # When in shared mode, this single URL proxies ALL services:
  #   - LLM: POST /v1/chat/completions (→ DeepSeek)
  #   - TTS: POST /v1/text-to-speech/{voice_id}/stream (→ ElevenLabs)
  #   - ASR: POST /v1/audio/transcriptions (→ Groq)
  shared_backend_url: "http://localhost:8000"

  # For "shared" mode: optional auth token for the shared backend
  shared_backend_key: ""

  # For "agentrouter" or "custom" mode: base URL of the API
  base_url: "https://api.deepseek.com"

  # Environment variable name to read the API key from
  api_key_env: "DEEPSEEK_API_KEY"

  # Fallback: DeepSeek API key (read from DEEPSEEK_API_KEY env var or keys.env)
  # In shared mode, this is NOT needed — the server holds the key
  deepseek_api_key: ""

  default_model: "deepseek-v4-pro"      # Default for general tasks
  task_routing:
    plan:   "deepseek-v4-pro"
    chat:   "deepseek-v4-pro"
    code:   "deepseek-v4-pro"
    reason: "deepseek-v4-pro"
    local:  "deepseek-v4-pro"
    memory: "deepseek-v4-pro"

memory:
  chroma_path: "~/.iris/memory/chroma"
  embedding_model: "BAAI/bge-m3"
  short_term_limit: 20              # Max messages in session buffer
  top_k_retrieval: 5                # Semantic search results injected into prompt
  habit_retrieval_limit: 3

audio:
  sample_rate: 16000
  channels: 1
  dtype: "float32"
  wake_words: ["jarvis", "iris"]

asr:
  model: "whisper-large-v3-turbo"
  groq_api_key: ""                  # Injected from $GROQ_API_KEY env var or keys.env
voice:
  elevenlabs_voice_name: "Bella"                # Human-readable label for the selected voice
  elevenlabs_voice_id: "hpp4J3VqNfWAUOO0d1Us"   # Pre-made female voice available via API
  elevenlabs_model: "eleven_flash_v2_5"
  stream: true

ui:
  ipc_port: 7788
  outline_width: 3                  # px

browser:
  headless: false
  credentials_path: "~/.iris/credentials.enc"

email:
  # SMTP for sending emails
  smtp_server: "smtp.gmail.com"          # Gmail: smtp.gmail.com, Outlook: smtp-mail.outlook.com
  smtp_port: 587                         # 587 (TLS) or 465 (SSL)
  sender_email: "your_email@gmail.com"   # Your email address
  sender_password: ""                    # Your password or app-specific password

  # IMAP for checking emails
  imap_server: "imap.gmail.com"          # Gmail: imap.gmail.com, Outlook: outlook.office365.com
  receiver_email: "your_email@gmail.com"
  receiver_password: ""                  # Same password as above

weather:
  # Get free API key at openweathermap.org/api
  openweather_api_key: ""                # Your OpenWeather API key (free tier)
  default_city: "London"                 # City for weather lookups if not specified

todo:
  # Todos are stored locally in ~/.iris/tasks.json
  # No configuration needed, but you can add default priority here
  default_priority: "normal"             # "low", "normal", or "high"

timers:
  # Timers and reminders are stored locally in ~/.iris/reminders.json
  # No configuration needed
  default_timezone: "UTC"                # For reminder display times

logging:
  level: "DEBUG"
  log_file: "logs/iris.log"
